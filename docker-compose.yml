services:
  mysql:
    image: mysql:8.4
    container_name: webond-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: webond_project
      TZ: Asia/Taipei

    ports:
      - "3307:3306"

    volumes:
      - webond_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  webond-mvc:
    build: .
    container_name: webond-mvc
    restart: unless-stopped

    ports:
      - "8082:8080"

    environment:
      TZ: Asia/Taipei
      JDBC_URL: "jdbc:mysql://mysql:3306/webond_project?serverTimezone=Asia/Taipei&characterEncoding=UTF-8"
      JDBC_USERNAME: root
      JDBC_PASSWORD: 123456

    depends_on:
      mysql:
        condition: service_healthy

  adminer:
    image: adminer
    container_name: webond-adminer
    restart: unless-stopped
    ports:
      - "8083:8080"
    depends_on:
      - mysql

volumes:
  webond_mysql_data: